{% extends "base.html" %}

{% block content %}
    <header class="bg-white py-3 border-bottom shadow-sm">
        <div class="container px-4 px-lg-5 my-2">
            <div class="text-center text-dark">
                <span class="badge text-bg-dark rounded-pill px-3 py-2 mb-3">Account</span>
                <h1 class="display-5 fw-bold">Update Profile</h1>
                <p class="lead text-muted mb-0">Edit your account details securely.</p>
            </div>
        </div>
    </header>
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 p-lg-5">
                            <h2 class="h5 fw-semibold mb-4 text-center">Profile Details</h2>
                            <form method="POST" action="{% url 'update_user'%}">
                                {% csrf_token %}
                                {{ user_form.as_p }}

                                <div class="d-grid gap-2 mt-3">
                                    <button type="submit" class="btn btn-dark btn-lg">Update Profile</button>
                                </div>
                            </form>
                            <div class="d-grid mt-3">
                                <a href="{% url 'update_password' %}" class="btn btn-outline-dark">Change Password</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
