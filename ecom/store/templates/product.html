{% extends "base.html" %}

{% block content %}
    <!-- Section-->
    <div class="container">
        <br/>
        <div class="card mb-3">
  <div class="row g-0">
    <div class="col-md-4">
      <img src="{{ product.image.url }}" class="img-fluid rounded-start" alt="...">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <center>
        <h5 class="card-title">{{ product.name }}</h5>
        <br/>
        <p class="card-text">{{ product.description }}</p>
        
        {% if product.is_sale %}
        <strike>
            ${{ product.price }}
        </strike>
        &nbsp;
        ${{ product.sale_price }}


        {% else%}
        ${{ product.price }}
        {% endif%}
        <br/><br/>

        <div class="row justify-content-center">
            <div class="col-md-2">Quantity:</div>
            <div class="col-md-2">
        <select class="form-select form-select-sm" id="qty-card">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        </select>
        </div>
        </div>

        <br/><br/>
        <a class="btn btn-secondary" href="{% url 'home' %}">Home</a>
        <button class="btn btn-primary" type='button' id="add-to-cart" value="{{ product.id }}">Add to Cart</button>
        <center/>
    </div>
      </div>
    </div>
  </div>
</div>
    </div>


    <br/><br/><br/><br/><br/><br/><br/>


<script>
$(document).on('click', '#add-to-cart', function(e) {
    e.preventDefault();
    $.ajax({
        url: "{% url 'cart_add' %}",
        type: "POST",
        data: {
            'product_id': $('#add-to-cart').val(),
            'quantity_qty': $('#qty-card option:selected').text(),
            'action': 'post',
            'csrfmiddlewaretoken': '{{ csrf_token }}'
        },
        success: function(json) {
           // console.log(json);
           document.getElementById("cart_quantity").textContent = json.Qty;
           location.reload();
        },
        error: function(xhr, errmsg, err) {
           
        }
    });
    
});
</script>
{% endblock %}
