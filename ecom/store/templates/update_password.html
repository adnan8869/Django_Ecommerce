{% extends "base.html" %}

{% block content %}
    <header class="bg-white py-5 border-bottom shadow-sm">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-dark">
                <span class="badge text-bg-dark rounded-pill px-3 py-2 mb-3">Security</span>
                <h1 class="display-5 fw-bold">Update Password</h1>
                <p class="lead text-muted mb-0">Enter your current password and choose a new one.</p>
            </div>
        </div>
    </header>
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 p-lg-5">
                            <h2 class="h5 fw-semibold mb-4 text-center">Password Settings</h2>
                            <form method="POST" action="{% url 'update_password'%}">
                                {% csrf_token %}
                                {{ form.as_p }}

                                <div class="d-grid mt-3">
                                    <button type="submit" class="btn btn-dark btn-lg">Update Password</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
