{% extends "base.html" %}
{% load socialaccount %}

{% block content %}
    <header class="bg-white py-3 border-bottom shadow-sm">
        <div class="container px-4 px-lg-5 my-2">
            <div class="text-center text-dark">
                <span class="badge text-bg-dark rounded-pill px-3 py-2 mb-3">Create Account</span>
                <h1 class="display-5 fw-bold">Register</h1>
                <p class="lead text-muted mb-0">Set up your account to start shopping.</p>
            </div>
        </div>
    </header>
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 p-lg-5">
                            <h2 class="h5 fw-semibold mb-4 text-center">Create Your Profile</h2>
                            <div class="d-grid mb-3">
                                <a class="btn btn-outline-dark btn-lg" href="{% provider_login_url 'google' process='login' %}">
                                    <i class="bi bi-google me-2"></i>Continue with Google
                                </a>
                            </div>
                            <div class="text-center text-muted small mb-3">or register with your details below</div>
                            <form method="POST" action="{% url 'register'%}">
                                {% csrf_token %}
                                {{ form.as_p }}

                                <div class="d-grid mt-3">
                                    <button type="submit" class="btn btn-dark btn-lg">Register</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
