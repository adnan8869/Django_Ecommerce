{% extends "base.html" %}

{% block content %}
    <header class="bg-white py-3 border-bottom shadow-sm">
        <div class="container px-4 px-lg-5 my-2">
            <div class="text-center text-dark">
                <span class="badge text-bg-dark rounded-pill px-3 py-2 mb-3">Account Access</span>
                <h1 class="display-5 fw-bold">Login</h1>
                <p class="lead text-muted mb-0">Please enter your credentials to continue.</p>
            </div>
        </div>
    </header>
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-5">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 p-lg-5">
                            <h2 class="h5 fw-semibold mb-4 text-center">Welcome Back</h2>
                            <form method="POST" action="{% url 'login'%}">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <input type="text" class="form-control form-control-lg" name="username" placeholder="Username">
                                </div>
                                <div class="mb-4">
                                    <input type="password" class="form-control form-control-lg" name="password" placeholder="Password">
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-dark btn-lg">Login</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
